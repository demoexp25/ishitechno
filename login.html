<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — IshiTrackers</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="brand">
      <span style="width:10px;height:10px;border-radius:50%;background:#3b82f6;
                   box-shadow:0 0 10px #3b82f6;display:inline-block;flex-shrink:0;"></span>
      IshiTrackers
    </div>
    <h2>Login to your dashboard</h2>

    <div class="error-msg"  id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" autocomplete="email"
               placeholder="you@example.com" required>
      </div>
      <div class="form-group" style="position:relative;">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password"
               placeholder="••••••••" required>
        <span onclick="togglePw()"
              style="position:absolute;right:12px;top:36px;cursor:pointer;
                     font-size:17px;color:var(--text-secondary);"
              id="pwEye">👁</span>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-secondary);">
          <input type="checkbox" id="rememberMe" style="width:auto;"> Remember me
        </label>
        <a href="#" id="forgotLink" style="font-size:13px;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
        Login
      </button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
    <p class="auth-footer"><a href="index.html">&larr; Back to home</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/login.js"></script>
</body>
</html>
